name: Docker Build

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-test:
    name: Docker Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (Node 22)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.node22-test
          push: false
          tags: agent-control-plane:test-node22
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Build validation image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.node22-validation
          push: false
          tags: agent-control-plane:validation
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Build NPM validation image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.npm-validation
          push: false
          tags: agent-control-plane:npm-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.node22-test
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
