name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type checking
        run: pnpm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']
        os: [ubuntu-latest]
        include:
          - node-version: '20.x'
            os: macos-latest
          - node-version: '20.x'
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:main
        env:
          NODE_ENV: test
          CI: true

      - name: Run parallel tests
        run: pnpm run test:parallel
        env:
          NODE_ENV: test
          CI: true

  routes:
    # Route-level integration tests for the ACP express routers
    # (compliance, audit, federation, role-routes, governance).
    # Lives in agent-control-plane/tests/routes/ as a self-contained
    # vitest project with its own package.json — installed lazily on
    # first run by the `test:routes` script. Closes T-24 + T-27 from
    # specs/active/Horsemen-Validation-Checklists.md v2.2.
    name: Route-level integration tests (T-24 / T-27)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install inner ACP dependencies
        # The route tests import handlers from agent-control-plane/src/**,
        # which has transitive deps (uuid, drizzle, etc.) installed only
        # by the inner package.json. The root pnpm install doesn't reach
        # them. Without this step vitest fails to resolve `uuid` when
        # governance/model-policies.ts is loaded.
        run: pnpm install --frozen-lockfile
        working-directory: agent-control-plane

      # Cache the route-test sub-project's node_modules separately from
      # the main pnpm cache (it uses npm, not pnpm, because Pulumi
      # policy packs and vitest's plugin model prefer the flat npm
      # layout). Cache key is the lockfile hash so a dep bump
      # invalidates cleanly.
      - name: Cache route-test node_modules
        uses: actions/cache@v4
        with:
          path: agent-control-plane/tests/routes/node_modules
          key: ${{ runner.os }}-route-tests-${{ hashFiles('agent-control-plane/tests/routes/package-lock.json') }}

      - name: Run route tests
        run: pnpm run test:routes
        env:
          NODE_ENV: test
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}-${{ matrix.os }}
          path: |
            test-results/
            test-reports/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build:main
        continue-on-error: true

      - name: Build WASM (optional)
        run: pnpm run build:wasm
        continue-on-error: true

      - name: Check build artifacts
        run: |
          ls -la agent-control-plane/dist/ || echo "Build artifacts not found"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            agent-control-plane/dist/
            agent-booster/dist/
            reasoningbank/dist/
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:main -- --coverage
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30
        if: always()

      - name: Generate coverage summary
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json
          else
            echo "Coverage report not generated"
          fi
        if: always()

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run mesh topology tests
        run: pnpm run test:mesh
        env:
          NODE_ENV: test
          CI: true

      - name: Run hierarchical topology tests
        run: pnpm run test:hierarchical
        env:
          NODE_ENV: test
          CI: true

      - name: Run ring topology tests
        run: pnpm run test:ring
        env:
          NODE_ENV: test
          CI: true

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QUIC transport benchmarks
        run: pnpm run bench:quic
        continue-on-error: true

      - name: Run parallel processing benchmarks
        run: pnpm run bench:parallel
        env:
          BENCHMARK_MODE: true
          ITERATIONS: 10
        continue-on-error: true

      - name: Generate benchmark report
        run: pnpm run bench:report
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/results/
            reports/
          retention-days: 30
        if: always()

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Run security audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Check for vulnerabilities
        run: pnpm audit --json > audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-results.json
          retention-days: 30
        if: always()

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, test, routes, build, coverage, integration]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Routes:      ${{ needs.routes.result }}"
          echo "Build:       ${{ needs.build.result }}"
          echo "Coverage:    ${{ needs.coverage.result }}"
          echo "Integration: ${{ needs.integration.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.routes.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Required checks failed"
            exit 1
          fi

          echo "All required checks passed!"
