name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ['feat:', 'fix:', 'docs:', 'refactor:', 'test:', 'chore:', 'ci:', 'perf:', 'style:'];
            const hasValidPrefix = validPrefixes.some(prefix => title.toLowerCase().startsWith(prefix));

            if (!hasValidPrefix) {
              core.setFailed(`PR title must start with one of: ${validPrefixes.join(', ')}`);
            } else {
              core.info('PR title format is valid');
            }

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.length < 50) {
              core.warning('PR description is quite short. Consider adding more details.');
            } else {
              core.info('PR description looks good');
            }

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: |
          echo "Code formatting check (placeholder for future prettier integration)"
          echo "Files changed:"
          git diff --name-only origin/${{ github.base_ref }}...HEAD

      - name: Analyze code complexity
        run: |
          echo "Code complexity analysis"
          find agent-control-plane/src -name "*.ts" -type f | head -20
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Check for dependency updates
        run: |
          pnpm install --frozen-lockfile
          echo "Checking for outdated dependencies..."
          pnpm outdated || true

      - name: Validate lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm lockfile exists"
            pnpm install --frozen-lockfile
          else
            echo "Warning: pnpm lockfile not found"
            exit 1
          fi

  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build:main

      - name: Check bundle sizes
        run: |
          echo "Checking build artifact sizes..."
          if [ -d agent-control-plane/dist ]; then
            du -sh agent-control-plane/dist/
            find agent-control-plane/dist -type f -name "*.js" -exec du -h {} \; | sort -rh | head -20
          else
            echo "Build directory not found"
            exit 1
          fi

      - name: Report size changes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const distPath = 'agent-control-plane/dist';
            if (fs.existsSync(distPath)) {
              const stats = fs.statSync(distPath);
              core.info(`Build directory size: ${(stats.size / 1024).toFixed(2)} KB`);
            }
        continue-on-error: true

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [pr-metadata, code-quality, dependency-check, size-check]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Generate PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'PR Metadata': '${{ needs.pr-metadata.result }}',
              'Code Quality': '${{ needs.code-quality.result }}',
              'Dependency Check': '${{ needs.dependency-check.result }}',
              'Size Check': '${{ needs.size-check.result }}'
            };

            let summary = '## PR Validation Summary\n\n';
            for (const [name, result] of Object.entries(results)) {
              const icon = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
              summary += `${icon} **${name}**: ${result}\n`;
            }

            core.summary.addRaw(summary);
            await core.summary.write();

            console.log(summary);
